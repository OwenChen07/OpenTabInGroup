<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 260px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f8f3f0;
        color: #014baa;
      }

      .header {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #014baa;
        margin-bottom: 12px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #e8effb;
        border-radius: 10px;
        padding: 12px 14px;
      }

      .label {
        font-size: 14px;
        color: #014baa;
      }

      .sublabel {
        font-size: 11px;
        color: #014baa;
        margin-top: 2px;
        opacity: 0.8;
      }

      .toggle-wrap {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }

      .toggle-wrap input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #bfd3f4;
        border-radius: 22px;
        cursor: pointer;
      }

      .slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: #f8f3f0;
        border-radius: 50%;
        /* transition: transform 0.2s; */
      }

      input:checked + .slider {
        background: #014baa;
      }

      input:checked + .slider::before {
        transform: translateX(18px);
        background: #f8f3f0;
      }

      .open-btn {
        width: 100%;
        margin-top: 12px;
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        background: #014baa;
        color: #f8f3f0;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .open-btn:hover {
        background: #013e8e;
      }

      .status {
        margin-top: 8px;
        min-height: 14px;
        font-size: 11px;
        color: #014baa;
        opacity: 0.85;
      }

      .link-btn {
        width: 100%;
        margin-top: 8px;
        border: 1px solid #014baa;
        border-radius: 10px;
        padding: 10px 12px;
        background: #f8f3f0;
        color: #014baa;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .link-btn:hover {
        background: #e8effb;
      }
    </style>
  </head>
  <body>
    <div class="header">Tab Grouping</div>
    <div class="row">
      <div>
        <div class="label">Auto-group new tabs</div>
        <!-- <div class="sublabel">Inherits the current tab's group</div> -->
      </div>
      <label class="toggle-wrap">
        <input id="toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <button id="openTab" class="open-btn" type="button">Open Tab in New Group</button>
    <button id="openTabAges" class="link-btn" type="button">Manage Tabs By Age</button>
    <button id="editShortcut" class="link-btn" type="button">Edit Keyboard Shortcut</button>
    <div id="status" class="status" aria-live="polite"></div>
    <script src="popup.js"></script>
  </body>
</html>
