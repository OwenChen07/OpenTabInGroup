<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 260px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
      }

      .header {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #6c7086;
        margin-bottom: 12px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #313244;
        border-radius: 10px;
        padding: 12px 14px;
      }

      .label {
        font-size: 14px;
        color: #cdd6f4;
      }

      .sublabel {
        font-size: 11px;
        color: #6c7086;
        margin-top: 2px;
      }

      .toggle-wrap {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }

      .toggle-wrap input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #45475a;
        border-radius: 22px;
        cursor: pointer;
      }

      .slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: #cdd6f4;
        border-radius: 50%;
        /* transition: transform 0.2s; */
      }

      input:checked + .slider {
        background: #89b4fa;
      }

      input:checked + .slider::before {
        transform: translateX(18px);
        background: #1e1e2e;
      }
    </style>
  </head>
  <body>
    <div class="header">Tab Grouping</div>
    <div class="row">
      <div>
        <div class="label">Auto-group new tabs</div>
        <div class="sublabel">Inherits the current tab's group</div>
      </div>
      <label class="toggle-wrap">
        <input id="toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
